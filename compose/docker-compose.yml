services:
  endpoint:
    image: ${IMAGE_NAME:-docker.madgik.di.uoa.gr/eosc-node-endpoint:latest}
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    container_name: node-endpoint
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:/app/config/application.properties
      THC_PORT: 8080
      THC_PATH: /api/endpoint
    healthcheck:
      test: ["CMD", "/workspace/health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always
    volumes:
      - ./config:/app/config
