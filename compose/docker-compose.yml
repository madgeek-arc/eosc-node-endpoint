services:
  endpoint:
    image: ${IMAGE_NAME:-docker.madgik.di.uoa.gr/eosc-node-endpoint:latest}
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    container_name: node-endpoint
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      SPRING_CONFIG_ADDITIONAL-LOCATION: /app/config/application.properties
    restart: always
    volumes:
      - ./config:/app/config
